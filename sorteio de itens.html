<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            text-align: center;
            
        }

        button{
            background-color: purple;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            height: 80px;
            width: 200px;
        }

        button:hover{
            background-color: blueviolet;
        }






    </style>
</head>
<body>
    <h1>🎁Sorteio de caixa premiada🎁</h1>
    <button onclick="abrircaixa()">Abrir caixa</button>
    <button onclick="mostrarinventario()">Mostrar Itens</button>

    <h2 id="ultimoitem"></h2>
    <ul id="colecao"></ul>

    <script>
        let itensPossiveis = [
            "🌲 Madeira",
            "🪨 Pedra",
            "🍌 Banana",
            "⚙️ Ferro",
            "🥇 Ouro",
            "💎 Diamante",
            "♦️ Rubi",
            "💚 Esmeralda"
        ]

        // vetor que armazena os itens obtidos pelo jogador
        let inventario = []

        function abrircaixa() {
            // sorteia um número entre 0 e 7
            let sorteado = Math.floor(Math.random() * itensPossiveis.length)
            
            // pegar o item da possição sorteada
            let item = itensPossiveis[sorteado]

            // Adiciona o item no inventário
            inventario.push(item);

            // Mostrar o item na tela
            document.getElementById("ultimoitem").innerHTML = "Você recebeu: " + item;
        }

        function mostrarinventario() {
            let lista = document.getElementById("colecao");

            // Limpa a lista
            lista.innerHTML = "";

            // percorre o vetor inventário e mostra na tela
            for( let i = 0; i < inventario.length; i++) {
                lista.innerHTML += 
                "<li>" +
                    (i + 1) + "º item: " + inventario[i] +
                "</li>";
            }
        }

    </script>


</body>
</html>
